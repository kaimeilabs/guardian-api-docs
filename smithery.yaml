# Guardian Engine — Smithery Configuration
# https://smithery.ai/servers/kaimeilabs/guardian-engine
#
# Guardian Engine is a hosted MCP server (Streamable HTTP).
# No local installation required — agents connect directly via HTTPS.

name: "Guardian Engine"
description: "Deterministic recipe verification for AI agents — catches hallucinated temperatures, missing techniques, wrong ingredients, and impossible cooking steps across 51 dishes and 4 continents. No API key required."
homepage: "https://kaimeilabs.dev"
icon: "https://api.kaimeilabs.dev/favicon.ico"

startCommand:
  type: "http"
  url: "https://api.kaimeilabs.dev/mcp"
  configSchema:
    type: "object"
    required: []
    properties:
      guardianApiKey:
        type: "string"
        title: "API Key"
        description: "Optional API key for priority access. Leave blank for free-tier usage (no key required)."
        default: ""
    additionalProperties: false
